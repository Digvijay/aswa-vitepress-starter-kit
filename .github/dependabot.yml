# Dependabot version updates. Editing this file forces a re-evaluation
# against the current workflow set.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vitepress:
        patterns:
          - "vitepress*"
          - "mermaid*"
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: monthly
