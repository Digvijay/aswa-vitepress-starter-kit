# Deploys the VitePress site to Azure Static Web Apps via azd, using
# OIDC-federated User Managed Identity (no secrets). Generated by `azd pipeline config`.
#
# PR preview environments are handled by `swa-pr-preview.yml` (Azure/static-web-apps-deploy@v1),
# because azd would re-provision the production SWA on every PR.
name: Deploy via azd

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

# Serialize deploys to the same environment so two pushes don't race the SWA upload.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      SWA_SKU: ${{ vars.SWA_SKU }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Cache azd state
        uses: actions/cache@v5
        with:
          path: |
            ~/.azd
            ~/.azure
          key: azd-${{ runner.os }}-${{ hashFiles('azure.yaml', 'infra/**') }}
          restore-keys: azd-${{ runner.os }}-

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Smoke test live site
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          get() { azd env get-value "$1" 2>/dev/null | tr -d '[:space:]' || true; }
          url=$(get SERVICE_WEB_URI)
          [ -z "$url" ] && url=$(get WEB_URI)
          if [ -z "$url" ]; then
            echo "::warning::no service URL exposed by azd; skipping smoke test"
            exit 0
          fi
          echo "Probing $url"
          for i in 1 2 3 4 5; do
            code=$(curl -fsSL -o /tmp/index.html -w '%{http_code}' "$url" || echo "000")
            if [ "$code" = "200" ] && grep -q '<title>' /tmp/index.html; then
              echo "OK ($code)"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retrying in 5s"
            sleep 5
          done
          echo "::warning::smoke test could not reach $url after 5 attempts (deploy itself succeeded)"
          exit 0

