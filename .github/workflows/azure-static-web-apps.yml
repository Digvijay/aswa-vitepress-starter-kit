# This skeleton is the deployment-token fallback for teams that cannot use OIDC.
# Recommended path: run `azd pipeline config` once — it will overwrite this file
# with an OIDC-federated workflow and you won't need to manage any secrets.
#
# Until either AZURE_STATIC_WEB_APPS_API_TOKEN or the azd OIDC variables exist,
# the deploy job is skipped so first-time forks don't see a red X on every push.
name: Deploy ASWA VitePress site

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check for deployment token
        id: check
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set; skipping deploy."
            echo "Run 'azd pipeline config' or add the secret manually."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.has_token == 'true'
        uses: actions/checkout@v4

      - if: steps.check.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - if: steps.check.outputs.has_token == 'true'
        run: npm ci

      - if: steps.check.outputs.has_token == 'true'
        run: npm run docs:build

      - if: steps.check.outputs.has_token == 'true'
        name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: '/'
          output_location: 'docs/.vitepress/dist'
          api_location: ''
          skip_app_build: true
